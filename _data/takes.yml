# Items are ordered newest-first within each category.
# The homepage sampler uses rank-based harmonic weighting (rank 0 = highest probability),
# so add new items at the TOP of each list.

categories:
  - id: consume
    label: Consume
    description: Books, papers, films, podcasts.
    items:
      - title: Designing Data-Intensive Applications
        desc: A practical lens on reliable systems, data, and engineering tradeoffs.
        type: Book
        rating: Essential
      - title: The Pragmatic Programmer
        desc: A classic on software craft, taste, and building with care.
        type: Book
        rating: Good
      - title: Why Greatness Cannot Be Planned
        desc: A good reminder that open-ended search often beats over-specified objectives.
        type: Book
        rating: Good
      - title: The Bitter Lesson
        desc: Rich Sutton's short essay on scale, search, learning, and what keeps winning.
        type: Paper
        rating: Essential
      - title: Reward is Enough
        desc: A compact argument for reward maximization as a path toward general intelligence.
        type: Paper
        rating: Good
      - title: Attention Is All You Need
        desc: The transformer paper that reshaped modern machine learning systems.
        type: Paper
        rating: Essential
      - title: AlphaGo
        desc: A documentary about Go, deep reinforcement learning, and the feeling of a field changing.
        type: Film
        rating: Essential
      - title: Chernobyl
        desc: A series about systems, incentives, responsibility, and truth under pressure.
        type: Series
        rating: Essential
      - title: The Joy of Why
        desc: A podcast for math, science, and the pleasure of asking precise questions.
        type: Podcast
        rating: Good

